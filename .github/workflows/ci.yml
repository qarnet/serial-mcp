name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix-flake:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: nix flake check
        run: nix flake check --accept-flake-config

  build-test:
    name: build / test / clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
          - os: ubuntu-24.04-arm
            install: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
          - os: macos-14
            install: ""
          - os: windows-latest
            install: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        if: matrix.os != 'windows-latest'
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build --all-targets
        run: cargo build --all-targets --locked

      - name: cargo test
        run: cargo test --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Validate example configs against vendored schemas
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --locked --test config_schema_validation

  native-sim:
    name: native_sim firmware + test
    runs-on: ubuntu-latest
    env:
      NCS_VERSION: v3.3.0
      NCS_INSTALL_DIR: /home/runner/ncs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config gcc-multilib libusb-1.0-0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Cache NCS SDK and toolchain
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/ncs
            /home/runner/.nrfutil
          key: ncs-${{ env.NCS_VERSION }}-v3

      - name: Download nrfutil
        run: |
          curl -L -o nrfutil https://files.nordicsemi.com/artifactory/swtools/external/nrfutil/executables/x86_64-unknown-linux-gnu/nrfutil
          chmod +x nrfutil
          sudo mv nrfutil /usr/local/bin/

      - name: Bootstrap nrfutil core module
        run: nrfutil self-upgrade

      - name: Install sdk-manager command
        run: nrfutil install sdk-manager

      - name: Configure sdk-manager install directory
        run: nrfutil sdk-manager config install-dir "$NCS_INSTALL_DIR"

      - name: Install NCS SDK and toolchain
        if: steps.cache-ncs.outputs.cache-hit != 'true'
        run: nrfutil sdk-manager install "$NCS_VERSION"

      - name: Build native_sim firmware
        run: |
          eval "$(nrfutil sdk-manager toolchain env --ncs-version "$NCS_VERSION" --as-script sh)"
          export ZEPHYR_BASE="$NCS_INSTALL_DIR/$NCS_VERSION/zephyr"
          west build -b native_sim firmware/

      - name: Run native_sim tests
        env:
          SERIAL_MCP_NATIVE_SIM_BIN: build/firmware/zephyr/zephyr.exe
        run: cargo test --test native_sim_validation -- --ignored
