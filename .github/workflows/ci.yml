name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: build / test / clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
          - os: macos-14
            install: ""
          - os: windows-latest
            install: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build --all-targets
        run: cargo build --all-targets --locked

      - name: cargo test
        run: cargo test --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Validate example configs against vendored schemas
        run: cargo test --locked --test config_schema_validation

  tag-and-release:
    name: Tag & Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Extract version
        id: version
        run: |
          VER=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "value=$VER" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        if: steps.tag.outputs.exists == 'false'
        run: cargo build --release --locked

      - name: Create tag and GitHub release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="v${{ steps.version.outputs.value }}"
          gh release create "$V" \
            --title "$V" \
            --generate-notes \
            target/release/serial-mcp
