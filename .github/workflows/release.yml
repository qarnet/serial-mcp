name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  prepare:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve ref metadata
        id: meta
        run: |
          echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: |
          VER=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "value=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists on origin
        id: tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=dry-run" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.tag.outputs.exists }}" = "true" ]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          else
            echo "mode=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release shell
        if: steps.mode.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${{ steps.version.outputs.tag }}" "${{ steps.meta.outputs.sha }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    if: needs.prepare.outputs.mode != 'skip'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: serial-mcp
            artifact_name_suffix: x86_64-linux
            install: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
            strip: strip
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: serial-mcp
            artifact_name_suffix: aarch64-linux
            install: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
            strip: strip
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: serial-mcp
            artifact_name_suffix: aarch64-macos
            install: ""
            strip: strip
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: serial-mcp.exe
            artifact_name_suffix: x86_64-windows
            install: ""
            strip: ""
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install system dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        if: matrix.os != 'windows-latest'
        uses: Swatinem/rust-cache@v2

      - name: Configure cross-compilation environment
        if: matrix.linker != ''
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=${{ matrix.pkg_config_allow_cross }}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${{ matrix.pkg_config_path }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.strip != ''
        run: ${{ matrix.strip }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Rename binary
        shell: bash
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          EXT="${{ matrix.artifact == 'serial-mcp.exe' && '.exe' || '' }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "serial-mcp-${VERSION}-${{ matrix.artifact_name_suffix }}${EXT}"

      - name: Upload dry-run artifacts
        if: needs.prepare.outputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: serial-mcp-${{ matrix.artifact_name_suffix }}
          path: serial-mcp-${{ needs.prepare.outputs.version }}-${{ matrix.artifact_name_suffix }}*

      - name: Upload release artifact
        if: needs.prepare.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          EXT="${{ matrix.artifact == 'serial-mcp.exe' && '.exe' || '' }}"
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "serial-mcp-${VERSION}-${{ matrix.artifact_name_suffix }}${EXT}" \
            --clobber

  publish-crate:
    name: Publish to crates.io
    needs: [prepare, build]
    if: needs.prepare.outputs.mode == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
