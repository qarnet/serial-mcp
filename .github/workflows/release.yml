name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: serial-mcp
            artifact_name_suffix: x86_64-linux
            install: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
            strip: strip
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: serial-mcp
            artifact_name_suffix: aarch64-linux
            install: sudo dpkg --add-architecture arm64 && sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libudev-dev:arm64 pkg-config
            strip: aarch64-linux-gnu-strip
            linker: aarch64-linux-gnu-gcc
            pkg_config_allow_cross: "1"
            pkg_config_path: /usr/lib/aarch64-linux-gnu/pkgconfig

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: serial-mcp
            artifact_name_suffix: aarch64-macos
            install: ""
            strip: strip
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: serial-mcp
            artifact_name_suffix: x86_64-macos
            install: ""
            strip: strip
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: serial-mcp.exe
            artifact_name_suffix: x86_64-windows
            install: ""
            strip: ""
            linker: ""
            pkg_config_allow_cross: ""
            pkg_config_path: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure cross-compilation environment
        if: matrix.linker != ''
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=${{ matrix.pkg_config_allow_cross }}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${{ matrix.pkg_config_path }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.strip != ''
        run: ${{ matrix.strip }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Rename binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          EXT="${{ matrix.artifact == 'serial-mcp.exe' && '.exe' || '' }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "serial-mcp-${VERSION}-${{ matrix.artifact_name_suffix }}${EXT}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: serial-mcp-*

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
