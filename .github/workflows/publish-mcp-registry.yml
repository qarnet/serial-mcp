name: Publish to MCP Registry

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# OIDC token required for mcp-publisher login github-oidc (no extra secrets needed)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'qarnet/serial-mcp' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['package']['version'])")
          echo "value=$VER" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: gate
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          TAG="v${VERSION}"
          NAME=$(jq -r '.name' server.json)

          # 1. The release tag must exist. Without it this was a dry-run build
          #    (workflow_dispatch on Release) and the referenced release binaries
          #    do not exist yet.
          if ! git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG not found — dry-run release, nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. The version must not already be in the registry. Publishing a
          #    duplicate version returns HTTP 400 and fails the job, so re-runs
          #    and un-bumped merges (tag exists from a prior release) must no-op.
          COUNT=$(curl -fsS --get \
            --data-urlencode "search=$NAME" \
            --data-urlencode "version=$VERSION" \
            https://registry.modelcontextprotocol.io/v0/servers \
            | jq -r '.metadata.count // 0')

          if [ "$COUNT" != "0" ]; then
            echo "$NAME@$VERSION already published to the MCP registry — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$NAME@$VERSION not yet published — proceeding."
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Build server.json from release binaries
        if: steps.gate.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BASE="https://github.com/qarnet/serial-mcp/releases/download/v${VERSION}"

          declare -A ASSETS=(
            ["x86_64-linux"]="serial-mcp-x86_64-linux"
            ["aarch64-linux"]="serial-mcp-aarch64-linux"
            ["aarch64-macos"]="serial-mcp-aarch64-macos"
            ["x86_64-windows"]="serial-mcp-x86_64-windows.exe"
          )

          PACKAGES="[]"
          for PLATFORM in x86_64-linux aarch64-linux aarch64-macos x86_64-windows; do
            ASSET="${ASSETS[$PLATFORM]}"
            URL="${BASE}/${ASSET}"
            echo "Hashing ${ASSET}..."
            SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
            PACKAGES=$(echo "$PACKAGES" | jq \
              --arg url "$URL" \
              --arg ver "$VERSION" \
              --arg sha "$SHA" \
              '. + [{
                "registryType": "mcpb",
                "identifier": $url,
                "version": $ver,
                "fileSha256": $sha,
                "transport": {"type": "stdio"}
              }]')
          done

          jq --arg v "$VERSION" --argjson pkgs "$PACKAGES" \
            '.version = $v | .packages = $pkgs' server.json > server.json.tmp
          mv server.json.tmp server.json

      - name: Validate server.json against schema
        if: steps.gate.outputs.publish == 'true'
        run: |
          curl -sL https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json \
            -o /tmp/mcp-server.schema.json
          nix develop .# --command \
            jsonschema-cli validate /tmp/mcp-server.schema.json -i server.json

      - name: Login to MCP Registry (GitHub OIDC)
        if: steps.gate.outputs.publish == 'true'
        run: nix run .#mcp-publisher -- login github-oidc

      - name: Publish to MCP Registry
        if: steps.gate.outputs.publish == 'true'
        run: nix run .#mcp-publisher -- publish
