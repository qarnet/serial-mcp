# SPDX-License-Identifier: MIT
#
# USB CDC-ACM variant of the native_sim test firmware.
#
# Adds the legacy USB device stack + CDC-ACM class so the 1200-baud
# touch → exit(42) flow can be tested via USB/IP.
#
# Applied with:
#   west build -b native_sim firmware/ -d build/native_sim_usb --pristine -S usb

name: usb
append:
  EXTRA_CONF_FILE: ../../config/usb.conf
  EXTRA_DTC_OVERLAY_FILE: ../../boards/native_sim_usb.overlay
