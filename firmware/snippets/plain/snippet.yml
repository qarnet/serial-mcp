#
# Plain native_sim firmware variant (no USB).
#
# Provides the base Kconfig. Must be applied explicitly —
# the project does not compile without a snippet.
#
# Applied with:
#   west build -b native_sim firmware/ -d build/native_sim --pristine -S plain

name: plain
append:
  EXTRA_CONF_FILE: ../../config/plain.conf
