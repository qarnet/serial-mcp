# SPDX-License-Identifier: MIT
#
# Static flash partition layout for XIAO BLE nRF52840.
# Matches zephyr/dts/vendor/nordic/nrf52840_partition_uf2_sdv7.dtsi.
#
# Why this exists:
# - Adafruit UF2 bootloader + SoftDevice s140 v7 occupy 0x0 - 0x27000
# - App MUST link at 0x27000, otherwise it overwrites the bootloader
# - Without CONFIG_USE_DT_CODE_PARTITION=y + this file, the app
#   would link at 0x0
#
# Ignored by native_sim (POSIX arch has no flash layout).

app:
  address: 0x27000
  size: 0xC5000
