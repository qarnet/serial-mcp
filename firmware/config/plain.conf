# SPDX-License-Identifier: MIT
#
# Kconfig for the plain native_sim test firmware.
# Applied by the "plain" snippet (snippets/plain/snippet.yml).
#
# USB CDC-ACM is NOT included. Use the "usb" snippet for that variant.

# UART driver subsystem
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y

# Board info for the `info` command
CONFIG_HWINFO=y

# Logging (goes to the system logger; not the command channel)
CONFIG_LOG=y

# Prevent Zephyr shell from being wired to the UART.
# CONSOLE itself is set by boards/native_sim.conf (y, needed for POSIX_ARCH_CONSOLE).
CONFIG_UART_CONSOLE=n
