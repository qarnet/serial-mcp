# SPDX-License-Identifier: MIT
#
# Kconfig for the USB CDC-ACM variant of the native_sim test firmware.
# Applied by the "usb" snippet (snippets/usb/snippet.yml).
#
# Includes common settings plus the legacy USB device stack for
# 1200-baud touch → exit(42) testing over USB/IP.

# --- Common settings ---

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y

CONFIG_HWINFO=y

CONFIG_LOG=y

# Prevent Zephyr shell from being wired to the UART.
# CONSOLE itself is set by boards/native_sim.conf (y, needed for POSIX_ARCH_CONSOLE).
CONFIG_UART_CONSOLE=n

# --- USB CDC-ACM (legacy stack — no device-next UDC for native_sim) ---

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

# Enable baud rate change callback (legacy API) for 1200-baud touch detection.
CONFIG_CDC_ACM_DTE_RATE_CALLBACK_SUPPORT=y

# Don't auto-init USB at boot — our usb_cdc_init() handles it.
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# Quieter logs.
CONFIG_USB_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USB_DEVICE_LOG_LEVEL_ERR=y
