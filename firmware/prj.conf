# SPDX-License-Identifier: MIT
#
# Common Kconfig for the native_sim test firmware.
# Per-board settings (PTY mode, USB CDC-ACM) live in boards/<board>.conf.
#
# USB CDC-ACM is OPT-IN via boards/native_sim_usb.conf + matching overlay.

# UART driver subsystem
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y

# Board info for the `info` command
CONFIG_HWINFO=y

# Logging (goes to the system logger; not the command channel)
CONFIG_LOG=y

# Zephyr's generic console would steal bytes from the command channel
# (prints `uart:~$` prompt, echoes input, etc). Disable it.
# The native_sim board's Kconfig.defconfig auto-enables CONSOLE=y for
# the PTY UART; we override that here.
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# USB CDC-ACM disabled by default. Enable via:
#   west build -b native_sim firmware/ \
#     -- -DEXTRA_CONF_FILE=boards/native_sim_usb.conf \
#        -DEXTRA_DTC_OVERLAY_FILE=boards/native_sim_usb.overlay
# When enabled, the firmware exposes a USB CDC-ACM UART over USB/IP
# that supports the 1200-baud touch → exit(42) flow.
# CONFIG_USB_DEVICE_STACK is not set
# CONFIG_USB_CDC_ACM is not set

