# SPDX-License-Identifier: MIT
#
# Common Kconfig shared by all targets (native_sim, xiao_ble).
# Per-board settings (UF2 output, flash partitions, PTY mode) live in
# boards/<board>.conf.
#
# USB CDC-ACM is OPT-IN via boards/<board>_usb.conf + matching overlay.

# UART driver subsystem
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y

# Board info for the `info` command
CONFIG_HWINFO=y

# Logging (goes to the system logger; not the command channel)
CONFIG_LOG=y

# Zephyr's generic console would steal bytes from the command channel
# (prints `uart:~$` prompt, echoes input, etc). Disable it.
# The native_sim board's Kconfig.defconfig auto-enables CONSOLE=y for
# the PTY UART; we override that here.
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# USB CDC-ACM disabled by default. Enable per-target via:
#   west build -b <board> firmware/ \
#     -- -DEXTRA_CONF_FILE=boards/<board>_usb.conf \
#        -DEXTRA_DTC_OVERLAY_FILE=boards/<board>_usb.overlay
# When enabled, the firmware exposes a USB CDC-ACM UART on the host
# that supports the 1200-baud touch → UF2 bootloader entry flow.
# CONFIG_USB_DEVICE_STACK is not set
# CONFIG_USBD_CDC_ACM_CLASS is not set
