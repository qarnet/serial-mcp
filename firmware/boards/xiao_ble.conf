# SPDX-License-Identifier: MIT
#
# Kconfig fragments for the XIAO BLE nRF52840 board.
# Applied with: west build -b xiao_ble firmware/
#
# Build the application to live AFTER the Adafruit UF2 bootloader
# + SoftDevice s140 (which occupy 0x0 - 0x27000).

# Produce a .uf2 for drag-drop flashing after entering UF2 mode.
CONFIG_BUILD_OUTPUT_UF2=y

# Honour the partition layout defined in firmware/pm_static.yml.
# Without this, the board default puts the app at 0x0 and overwrites
# the bootloader.
CONFIG_USE_DT_CODE_PARTITION=y

# We are NOT using MCUboot. The Adafruit UF2 bootloader is pre-flashed
# at 0x0.
CONFIG_BOOTLOADER_MCUBOOT=n

# Allow direct GPIO access for any future commands that need it.
CONFIG_GPIO=y
