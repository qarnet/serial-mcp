#
# Kconfig fragments for the native_sim board.
# Applied with: west build -b native_sim firmware/
#
# The native_sim board already provides zephyr,console = &uart0 and
# CONFIG_UART_NATIVE_PTY is auto-enabled because the board's uart0 uses
# the "zephyr,native-pty-uart" compatible. This file just tunes the
# PTY mode for automated testing and disables console features that
# would otherwise steal bytes from our command channel.

# Connect uart0 to its own dedicated pseudo-terminal (default).
# Tests parse the "UART_0 connected to pseudotty: /dev/pts/N" line from
# stderr to find the PTY path. Using ON_OWN_PTY keeps logs and the
# command channel on separate streams.
CONFIG_UART_NATIVE_PTY_0_ON_OWN_PTY=y

# Disable Zephyr's auto-enable of UART_CONSOLE in Kconfig.defconfig
# (which is set when both CONSOLE=y and SERIAL=y). We do NOT want
# the Zephyr console to be wired to our UART - it would emit prompts
# and consume bytes meant for the command channel.
# prj.conf sets CONSOLE=n to keep the Zephyr shell off the UART
# command channel. On native_sim however, the board unconditionally
# selects POSIX_ARCH_CONSOLE (printk→host stdout) which depends on
# CONSOLE=y. Override CONSOLE back to y here so the select is
# satisfied. POSIX_ARCH_CONSOLE only affects printk output (goes
# to the host terminal, not the PTY), so it does not interfere
# with the command channel.
CONFIG_CONSOLE=y

# Ensure UART_CONSOLE stays off — we do NOT want the Zephyr shell
# wired to the PTY (it would steal bytes from the command channel).
CONFIG_UART_CONSOLE=n
