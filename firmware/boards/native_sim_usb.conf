# SPDX-License-Identifier: MIT
#
# Kconfig fragment for native_sim + USB CDC-ACM (1200-baud touch test).
# Uses the LEGACY USB device stack because the device-next stack has no
# UDC driver for native_sim (only legacy USB_NATIVE_POSIX exists).
#
# Applied with:
#   west build -b native_sim firmware/ \
#     -- -DEXTRA_CONF_FILE=boards/native_sim_usb.conf \
#        -DEXTRA_DTC_OVERLAY_FILE=boards/native_sim_usb.overlay

# Enable legacy USB device stack (not device-next — no native_sim UDC driver).
CONFIG_USB_DEVICE_STACK=y

# CDC-ACM class driver (auto-enabled by devicetree node, explicit here for clarity).
CONFIG_USB_CDC_ACM=y

# Enable baud rate change callback (legacy API) for 1200-baud touch detection.
CONFIG_CDC_ACM_DTE_RATE_CALLBACK_SUPPORT=y

# Don't auto-init USB at boot — our usb_cdc_init() handles it.
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# Quieter logs.
CONFIG_USB_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USB_DEVICE_LOG_LEVEL_ERR=y
