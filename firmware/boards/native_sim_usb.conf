# SPDX-License-Identifier: MIT
#
# Kconfig fragment for native_sim + USB CDC-ACM (1200-baud touch test).
# Applied with:
#   west build -b native_sim firmware/ \
#     -- -DEXTRA_CONF_FILE=boards/native_sim_usb.conf \
#        -DEXTRA_DTC_OVERLAY_FILE=boards/native_sim_usb.overlay
#
# The native_sim board's DTS already declares zephyr_udc0 as
# "zephyr,native-posix-udc", and USB_NATIVE_POSIX is auto-enabled.
# This file just adds the CDC-ACM class + 16-byte serial number.

# Use the new USB device stack (device-next API).
CONFIG_USB_DEVICE_STACK_NEXT=y

# CDC-ACM class implementation (device-next variant).
CONFIG_USBD_CDC_ACM_CLASS=y

# Don't auto-initialize a serial console on the CDC UART at boot.
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Disable the legacy USB device stack (we use the new one).
# (No explicit "USB_DEVICE_STACK=n" needed — they're independent menus.)

# Quieter logs for the USB subsystem.
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
