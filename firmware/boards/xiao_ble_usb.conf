# SPDX-License-Identifier: MIT
#
# Kconfig fragment for xiao_ble + USB CDC-ACM (1200-baud touch via native USB).
# Applied with:
#   west build -b xiao_ble firmware/ \
#     -- -DEXTRA_CONF_FILE=boards/xiao_ble_usb.conf \
#        -DEXTRA_DTC_OVERLAY_FILE=boards/xiao_ble_usb.overlay
#
# The xiao_ble board's common DTSI (boards/seeed/xiao_ble/xiao_ble_common.dtsi)
# already includes cdc_acm_serial.dtsi which creates a board_cdc_acm_uart
# node on the nordic,nrf-usbd controller. The nRF USBD driver is
# auto-selected by DTS.
#
# This file just enables the new USB device stack + CDC-ACM class.
# The CDC-ACM UART is for 1200-baud touch ONLY — it must NOT be the
# console (commands go over the physical uart0). The overlay overrides
# zephyr,console to keep the physical uart0 as the command channel.

# Use the new USB device stack (device-next API).
CONFIG_USB_DEVICE_STACK_NEXT=y

# CDC-ACM class implementation (device-next variant).
CONFIG_USBD_CDC_ACM_CLASS=y

# Don't auto-initialize a serial console on the CDC UART at boot.
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Quieter logs for the USB subsystem.
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
